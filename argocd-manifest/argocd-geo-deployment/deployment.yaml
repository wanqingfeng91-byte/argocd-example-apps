apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-service
  namespace: geo-system
spec:
  replicas: 5
  selector:
    matchLabels:
      app: geo-service
  template:
    metadata:
      labels:
        app: geo-service
    spec:
      containers:
      - name: geo-service
        image: jasonops/argocd-geo-demo:v2.0
        ports:
        - containerPort: 5000